<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvalHub — MCP EDD Workflow</title>
<link rel="stylesheet" href="https://noyitz.github.io/flowstory/templates/style.css">
</head>
<body>
<button class="fs-theme-toggle" id="fs-theme">&#9790;</button>
<div class="fs-brand" id="fs-brand"></div>
<div class="fs-title" id="fs-title"></div>
<div class="fs-panel">
  <div class="fs-flow-bar">
    <select id="fs-flow-select"></select>
    <button class="fs-start" id="fs-play">&#9654; Start</button>
    <button id="fs-speed">1x</button>
    <button id="fs-loop" style="border-color:#79c0ff;color:#79c0ff">&#8635; Loop</button>
    <button class="fs-reset" id="fs-reset">Reset</button>
  </div>
  <div class="fs-steps" id="fs-steps">
    <div class="fs-steps-title">Flow Steps <span style="font-weight:400;font-size:11px;color:var(--fs-text-dim)">· click to jump</span></div>
    <div id="fs-steps-container"></div>
  </div>
  <div class="fs-inspector" id="fs-inspector">
    <div class="fs-inspector-title" id="fs-inspector-title" style="color:var(--fs-accent)">Request</div>
    <div id="fs-inspector-content"></div>
  </div>
</div>
<div id="fs-highlight-box" style="display:none;position:fixed;z-index:350;border-radius:10px;pointer-events:none"></div>
<div id="fs-overlay" style="display:none;position:fixed;top:0;left:0;right:380px;bottom:0;z-index:300;background:rgba(0,0,0,0.6)">
  <div id="fs-overlay-card" style="position:absolute;background:#161b22ee;border:1px solid #30363d;border-radius:14px;max-width:420px;padding:22px 26px;box-shadow:0 12px 40px rgba(0,0,0,0.5)">
    <button id="fs-overlay-close" style="position:absolute;top:10px;right:14px;background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px">&#10005;</button>
    <div id="fs-overlay-accent" style="width:4px;height:24px;border-radius:2px;position:absolute;left:0;top:22px"></div>
    <h2 id="fs-overlay-title" style="margin:0 0 6px;font-size:18px;color:#c9d1d9;font-family:system-ui"></h2>
    <p id="fs-overlay-desc" style="margin:0 0 14px;font-size:13px;color:#8b949e;line-height:1.5;font-family:system-ui"></p>
    <div id="fs-overlay-details" style="font-size:12px;font-family:'SF Mono',Menlo,monospace"></div>
    <button id="fs-overlay-resume" style="margin-top:14px;padding:7px 20px;border:1px solid #3fb950;border-radius:8px;background:transparent;color:#3fb950;font-size:13px;cursor:pointer;font-family:system-ui">&#9654; Resume Flow</button>
  </div>
</div>
<div class="fs-legend" id="fs-legend"></div>
<canvas id="fs-canvas"></canvas>
<script type="module">

          }

        {
          "text": "5. DEFINE: Agent reads evalhub://benchmarks",

          "fromRight": true, "toLeft": true, "yOff": 18,
          "inspector": {
            "title": "MCP Resource Read",
            "body": "{\n  \"method\": \"resources/read\",\n  \"params\": {\n    \"uri\": \"evalhub://benchmarks?labels=rag,retrieval\"\n  }\n}"

        },
        {
          "text": "6. MCP returns benchmark list",
          "mode": "arrow", "from": "mcp", "to": "agent",
          "color": "#3fb950", "num": 6,
          "fromLeft": true, "toRight": true, "yOff": 28,
          "inspector": {
            "title": "Benchmark List Response",
            "body": "{\n  \"contents\": [\n    {\n      \"uri\": \"evalhub://benchmarks\",\n      \"text\": \"[\\n  {\\\"name\\\": \\\"rag-faithfulness\\\", ...},\\n  {\\\"name\\\": \\\"rag-relevance\\\", ...},\\n  {\\\"name\\\": \\\"context-recall\\\", ...}\\n]\"\n    }\n  ]\n}"
          }
        },
        {
          "text": "7. MEASURE: Agent calls submit_evaluation tool",
          "mode": "arrow", "from": "agent", "to": "mcp",
          "color": "#f0883e", "num": 7,
          "fromRight": true, "toLeft": true, "yOff": -18,
          "inspector": {
            "title": "MCP Tool Call — submit_evaluation",
            "body": "{\n  \"method\": \"tools/call\",\n  \"params\": {\n    \"name\": \"submit_evaluation\",\n    \"arguments\": {\n      \"model_endpoint\": \"https://api.example.com/v1/chat\",\n      \"benchmarks\": [\"rag-faithfulness\", \"rag-relevance\"],\n      \"experiment\": {\n        \"name\": \"rag-v2-iteration-1\",\n        \"temperature\": 0.3\n      }\n    }\n  }\n}"
          }
        },
        {
          "text": "8. MCP forwards to EvalHub API",
          "mode": "arrow", "from": "mcp", "to": "api",
          "color": "#58a6ff", "num": 8,
          "inspector": {
            "title": "REST API Call",
            "body": "POST /api/v1/jobs\nAuthorization: Bearer <token>\nContent-Type: application/json\n\n{\n  \"model_endpoint\": \"https://api.example.com/v1/chat\",\n  \"benchmarks\": [\"rag-faithfulness\", \"rag-relevance\"],\n  \"experiment\": {\n    \"name\": \"rag-v2-iteration-1\",\n    \"temperature\": 0.3\n  }\n}"
          }
        },
        {
          "text": "9. API stores job in PostgreSQL",
          "mode": "arrow", "from": "api", "to": "postgres",
          "color": "#58a6ff", "num": 9,

            "title": "Database Insert",
            "body": "INSERT INTO jobs (\n  id, status, model_endpoint,\n  benchmarks, experiment_config,\n  created_at\n) VALUES (\n  'job-abc123', 'PENDING',\n  'https://api.example.com/v1/chat',\n  '{\"rag-faithfulness\",\"rag-relevance\"}',\n  '{...}', NOW()\n);"

          "inspector": {
            "title": "API Response",
            "body": "HTTP 201 Created\n\n{\n  \"id\": \"job-abc123\",\n  \"status\": \"PENDING\",\n  \"benchmarks\": [\"rag-faithfulness\", \"rag-relevance\"],\n  \"created_at\": \"2026-06-04T10:30:00Z\"\n}"

        },
        {
          "text": "12. MCP returns job ID to Agent",

          "inspector": {
            "title": "Tool Result",
            "body": "{\n  \"content\": [\n    {\n      \"type\": \"text\",\n      \"text\": \"{\\\"job_id\\\": \\\"job-abc123\\\", \\\"status\\\": \\\"PENDING\\\", \\\"message\\\": \\\"Evaluation submitted successfully\\\"}\"\n    }\n  ]\n}"
          }
        },
        {
          "text": "13. Agent polls get_job_status",
          "mode": "arrow", "from": "agent", "to": "mcp",

            "title": "MCP Tool Call — get_job_status",
            "body": "{\n  \"method\": \"tools/call\",\n  \"params\": {\n    \"name\": \"get_job_status\",\n    \"arguments\": {\n      \"job_id\": \"job-abc123\"\n    }\n  }\n}"

        },
        {
          "text": "14. MCP queries EvalHub API",

          "color": "#58a6ff", "num": 14,

          "inspector": {
            "title": "REST API Call",
            "body": "GET /api/v1/jobs/job-abc123\nAuthorization: Bearer <token>"

        },

          "text": "15. API returns job status",
          "mode": "arrow", "from": "api", "to": "mcp",
          "color": "#3fb950", "num": 15,
          "fromLeft": true, "toRight": true, "yOff": 20,

            "title": "Job Status Response",

          }
        },
        {
          "text": "16. MCP returns progress to Agent",
          "mode": "arrow", "from": "mcp", "to": "agent",
          "color": "#3fb950", "num": 16,
          "fromLeft": true, "toRight": true, "yOff": 42,
          "inspector": {
            "title": "Tool Result — Job Status",
            "body": "{\n  \"content\": [\n    {\n      \"type\": \"text\",\n      \"text\": \"{\\\"job_id\\\": \\\"job-abc123\\\", \\\"status\\\": \\\"COMPLETED\\\", \\\"progress\\\": 100, \\\"scores\\\": {\\\"rag-faithfulness\\\": 0.847, \\\"rag-relevance\\\": 0.912}}\"\n    }\n  ]\n}"
          }

          "color": "#d2a8ff", "num": 19,
          "fromLeft": true, "toRight": true, "yOff": -18,
          "inspector": {
            "title": "Comparison Response",
            "body": "{\n  \"messages\": [\n    {\n      \"role\": \"assistant\",\n      \"content\": \"Run Comparison:\\n\\njob-abc123 (iteration-1):\\n  faithfulness: 0.847\\n  relevance: 0.912\\n\\njob-xyz789 (baseline):\\n  faithfulness: 0.792\\n  relevance: 0.881\\n\\nDelta: +6.9% faithfulness, +3.5% relevance\\nRecommendation: Continue iterating on retrieval context.\"\n    }\n  ]\n}"
          }

            "title": "MCP Tool Call — submit_evaluation",

          "text": "6. Agent polls get_job_status",
          "mode": "arrow", "from": "agent", "to": "mcp",
          "color": "#58a6ff", "num": 6,
          "fromRight": true, "toLeft": true, "yOff": 15,
          "inspector": {
            "title": "MCP Tool Call — get_job_status",
            "body": "{\n  \"method\": \"tools/call\",\n  \"params\": {\n    \"name\": \"get_job_status\",\n    \"arguments\": {\n      \"job_id\": \"job-def456\"\n    }\n  }\n}"
          }
        },
        {
          "text": "7. Status returned via MCP Server",
          "mode": "arrow", "from": "mcp", "to": "agent",
          "color": "#3fb950", "num": 7,
          "fromLeft": true, "toRight": true, "yOff": 5,
          "inspector": {
            "title": "Status Relay",
            "body": "MCP Server queries:\n  GET /api/v1/jobs/job-def456\n\nRelays status to agent:\n  status: RUNNING\n  progress: 75%\n  completed: 3/4 benchmarks"

        {
          "text": "8. Final results returned to Agent",
          "mode": "arrow", "from": "mcp", "to": "agent",
          "color": "#3fb950", "num": 8,
          "fromLeft": true, "toRight": true, "yOff": 25,

            "title": "Final Results",
            "body": "{\n  \"content\": [\n    {\n      \"type\": \"text\",\n      \"text\": \"{\\\"job_id\\\": \\\"job-def456\\\", \\\"status\\\": \\\"COMPLETED\\\", \\\"progress\\\": 100, \\\"scores\\\": {\\\"toxicity\\\": 0.023, \\\"bias\\\": 0.045, \\\"jailbreak_resistance\\\": 0.967, \\\"content_safety\\\": 0.991}}\"\n    }\n  ]\n}"
          }
        }
      ]

  },
  "legend": [
    { "label": "MCP Tool Call", "color": "#58a6ff" },
    { "label": "Response", "color": "#3fb950" },
    { "label": "Evaluation", "color": "#f0883e" },
    { "label": "MCP Prompt", "color": "#d2a8ff" }

window.__flowstory = viz;
await viz.load(diagram);
