            "title": "MCP Request (via RBAC Proxy)",
            "body": "{\n  \"method\": \"prompts/get\",\n  \"params\": {\n    \"name\": \"edd_workflow\",\n    \"arguments\": {\n      \"application_type\": \"RAG\"\n    }\n  }\n}\n\nRequest hits kube-rbac-proxy first."
          }
        },
        {
          "text": "2. MCP kube-rbac-proxy calls K8s API (TokenReview + SAR)",
          "mode": "arrow",
          "from": "mcp_rbac_proxy",
          "to": "k8s_api",
          "color": "#f0883e",
          "num": 2,
          "inspector": {
            "title": "RBAC Proxy \u2014 Auth Check (MCP)",
            "body": "kube-rbac-proxy intercepts the request:\n\n1. TokenReview: Validates bearer token\n   against Kubernetes API server\n\n2. SubjectAccessReview (namespace-scoped):\n   Equivalent to:\n   oc auth can-i create \\\n     evaluations.trustyai.opendatahub.io \\\n     -n <namespace>\n\n   Namespace extracted from X-Tenant header.\n   {\n     apiGroup: trustyai.opendatahub.io\n     resource: evaluations\n     verb: create\n     namespace: {{.FromHeader X-Tenant}}\n   }\n\n   Decisions cached (allow: 5m, deny: 30s)\n\nOn success, forwards to localhost:3001"
          }
        },

          "num": 3,
          "fromBottom": true,
          "toTop": true,
          "inspector": {
            "title": "Forward to MCP Server",

          "num": 4,
          "fromLeft": true,
          "toRight": true,
          "yOff": 12,

            "title": "EDD Guidance Response",

          }
        },
        {
          "text": "5. DEFINE: Agent reads evalhub://providers",
          "mode": "arrow",
          "from": "agent",
          "to": "mcp_rbac_proxy",
          "glow": "mcp_service",
          "color": "#58a6ff",
          "num": 5,
          "fromRight": true,
          "toLeft": true,
          "yOff": -8,
          "inspector": {
            "title": "MCP Resource Read",

          }
        },
        {
          "text": "6. MCP kube-rbac-proxy calls K8s API (TokenReview + SAR)",

          "from": "mcp_rbac_proxy",
          "to": "k8s_api",
          "color": "#f0883e",
          "num": 6,
          "inspector": {
            "title": "MCP RBAC Proxy \u2014 SAR Check",

          }
        },

          "to": "k8s_api",
