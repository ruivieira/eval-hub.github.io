<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvalHub — Evaluation Job Workflow</title>
<link rel="stylesheet" href="https://noyitz.github.io/flowstory/templates/style.css">
</head>
<body>
<button class="fs-theme-toggle" id="fs-theme">&#9790;</button>
<div class="fs-brand" id="fs-brand"></div>
<div class="fs-title" id="fs-title"></div>
<div class="fs-panel">
  <div class="fs-flow-bar">
    <select id="fs-flow-select"></select>
    <button class="fs-start" id="fs-play">&#9654; Start</button>
    <button id="fs-speed">1x</button>
    <button id="fs-loop" style="border-color:#79c0ff;color:#79c0ff">&#8635; Loop</button>
    <button class="fs-reset" id="fs-reset">Reset</button>
  </div>
  <div class="fs-steps" id="fs-steps">
    <div class="fs-steps-title">Flow Steps <span style="font-weight:400;font-size:11px;color:var(--fs-text-dim)">· click to jump</span></div>
    <div id="fs-steps-container"></div>
  </div>
  <div class="fs-inspector" id="fs-inspector">
    <div class="fs-inspector-title" id="fs-inspector-title" style="color:var(--fs-accent)">Request</div>
    <div id="fs-inspector-content"></div>
  </div>
</div>
<div id="fs-highlight-box" style="display:none;position:fixed;z-index:350;border-radius:10px;pointer-events:none"></div>
<div id="fs-overlay" style="display:none;position:fixed;top:0;left:0;right:380px;bottom:0;z-index:300;background:rgba(0,0,0,0.6)">
  <div id="fs-overlay-card" style="position:absolute;background:#161b22ee;border:1px solid #30363d;border-radius:14px;max-width:420px;padding:22px 26px;box-shadow:0 12px 40px rgba(0,0,0,0.5)">
    <button id="fs-overlay-close" style="position:absolute;top:10px;right:14px;background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px">&#10005;</button>
    <div id="fs-overlay-accent" style="width:4px;height:24px;border-radius:2px;position:absolute;left:0;top:22px"></div>
    <h2 id="fs-overlay-title" style="margin:0 0 6px;font-size:18px;color:#c9d1d9;font-family:system-ui"></h2>
    <p id="fs-overlay-desc" style="margin:0 0 14px;font-size:13px;color:#8b949e;line-height:1.5;font-family:system-ui"></p>
    <div id="fs-overlay-details" style="font-size:12px;font-family:'SF Mono',Menlo,monospace"></div>
    <button id="fs-overlay-resume" style="margin-top:14px;padding:7px 20px;border:1px solid #3fb950;border-radius:8px;background:transparent;color:#3fb950;font-size:13px;cursor:pointer;font-family:system-ui">&#9654; Resume Flow</button>
  </div>
</div>
<div class="fs-legend" id="fs-legend"></div>
<canvas id="fs-canvas"></canvas>
<script type="module">
import { FlowStory } from 'https://noyitz.github.io/flowstory/src/index.js';

const diagram = {
  "meta": {
    "title": "EvalHub — Evaluation Job Workflow"
  },
  "canvas": {
    "width": 1250,
    "height": 1050
  },
  "nodes": {
    "client": {
      "x": -20,
      "y": 420,
      "w": 100,
      "h": 50,
      "label": "Client",
      "sublabel": "Dashboard / API",
      "type": "icon",
      "tooltip": {
        "title": "Client / Dashboard",
        "desc": "External user or ODH Dashboard submitting evaluation jobs via REST API. Can be a human user, CI/CD pipeline, or the OpenShift AI Dashboard UI.",
        "details": [
          { "label": "Protocol", "value": "HTTPS" },
          { "label": "Auth", "value": "Bearer token (ServiceAccount or User)" },
          { "label": "Endpoint", "value": "POST /api/v1/evaluations/jobs" }
        ]
      }
    },
    "evalhub_api": {
      "x": 200,
      "y": 380,
      "w": 200,
      "h": 100,
      "label": "EvalHub API",
      "sublabel": "REST Service :8080",
      "color": "#58a6ff",
      "fontSize": 17,
      "tooltip": {
        "title": "EvalHub API Server",
        "desc": "Central REST API service handling authentication, authorization, job lifecycle management, and orchestration. Validates tokens via TokenReview and checks permissions via SubjectAccessReview.",
        "details": [
          { "label": "Port", "value": "8080" },
          { "label": "Auth", "value": "TokenReview + SubjectAccessReview" },
          { "label": "Framework", "value": "Go / gin-gonic" },
          { "label": "API Version", "value": "v1" }
        ]
      }
    },
    "postgres": {
      "x": 200,
      "y": 600,
      "w": 200,
      "h": 70,
      "label": "PostgreSQL",
      "sublabel": "Job Records",
      "color": "#3fb950",
      "fontSize": 16,
      "tooltip": {
        "title": "PostgreSQL Database",
        "desc": "Persistent storage for evaluation job records, status tracking, and metadata. Stores job state transitions (Pending -> Running -> Complete/Failed).",
        "details": [
          { "label": "Tables", "value": "evaluation_jobs, job_results" },
          { "label": "States", "value": "Pending, Running, Complete, Failed" },
          { "label": "Port", "value": "5432" }
        ]
      }
    },
    "k8s_api": {
      "x": 200,
      "y": 180,
      "w": 200,
      "h": 70,
      "label": "Kubernetes API",
      "sublabel": "Control Plane",
      "color": "#8b949e",
      "fontSize": 16,
      "tooltip": {
        "title": "Kubernetes API Server",
        "desc": "K8s control plane used to create and manage evaluation Job resources and associated ConfigMaps. EvalHub API creates K8s Jobs that spawn eval pods.",
        "details": [
          { "label": "Resources", "value": "Job, ConfigMap, Pod" },
          { "label": "Auth", "value": "ServiceAccount RBAC" },
          { "label": "Port", "value": "6443" }
        ]
      }
    },
    "eval_pod": {
      "x": 520,
      "y": 200,
      "w": 340,
      "h": 400,
      "label": "Eval Job Pod",
      "sublabel": "Ephemeral",
      "color": "#d2a8ff",
      "fontSize": 17,
      "type": "container",
      "tooltip": {
        "title": "Evaluation Job Pod",
        "desc": "Ephemeral Kubernetes pod created per evaluation job. Contains an init container for data download, the eval adapter for running evaluations, and a sidecar proxy for authenticated egress.",
        "details": [
          { "label": "Lifecycle", "value": "Created per job, terminated on completion" },
          { "label": "Restart Policy", "value": "Never" },
          { "label": "Containers", "value": "Init + Eval Adapter + Sidecar Proxy" }
        ]
      }
    },
    "init_container": {
      "x": 545,
      "y": 250,
      "w": 290,
      "h": 60,
      "label": "Init Container",
      "sublabel": "Data Download",
      "color": "#8b949e",
      "fontSize": 14,
      "inner": true,
      "tooltip": {
        "title": "Init Container",
        "desc": "Runs before the main containers start. Downloads test datasets and evaluation configurations from S3-compatible storage into a shared volume.",
        "details": [
          { "label": "Phase", "value": "Runs first, must succeed" },
          { "label": "Source", "value": "S3-compatible storage" },
          { "label": "Output", "value": "Shared emptyDir volume" }
        ]
      }
    },
    "eval_adapter": {
      "x": 545,
      "y": 350,
      "w": 290,
      "h": 70,
      "label": "Eval Adapter",
      "sublabel": "lm-eval / lighteval / garak",
      "color": "#f0883e",
      "fontSize": 14,
      "inner": true,
      "tooltip": {
        "title": "Evaluation Adapter",
        "desc": "Main evaluation container running the selected evaluation framework (lm-eval, lighteval, garak, etc.). Reads test data from shared volume and sends results to the sidecar proxy.",
        "details": [
          { "label": "Frameworks", "value": "lm-eval, lighteval, garak" },
          { "label": "Output", "value": "Results via localhost:8080 to sidecar" },
          { "label": "GPU", "value": "Optional, configured per job" }
        ]
      }
    },
    "sidecar_proxy": {
      "x": 545,
      "y": 460,
      "w": 290,
      "h": 70,
      "label": "Sidecar Proxy",
      "sublabel": "KEP-753 Native Sidecar",
      "color": "#79c0ff",
      "fontSize": 14,
      "inner": true,
      "tooltip": {
        "title": "Sidecar Proxy",
        "desc": "KEP-753 native sidecar container handling authenticated egress. Receives results from the eval adapter on localhost:8080, then reports status, logs metrics, and pushes artifacts to external services.",
        "details": [
          { "label": "Listen", "value": "localhost:8080" },
          { "label": "Type", "value": "KEP-753 native sidecar" },
          { "label": "Egress", "value": "EvalHub API, MLflow, OCI Registry" }
        ]
      }
    },
    "s3_storage": {
      "x": 950,
      "y": 200,
      "w": 180,
      "h": 70,
      "label": "S3 Storage",
      "sublabel": "Test Data",
      "color": "#8b949e",
      "fontSize": 16,
      "tooltip": {
        "title": "S3-Compatible Storage",
        "desc": "Object storage holding evaluation test datasets, benchmark data, and configuration files. Accessed by the init container at pod startup.",
        "details": [
          { "label": "Protocol", "value": "S3 API (HTTPS)" },
          { "label": "Content", "value": "Test datasets, benchmarks" },
          { "label": "Access", "value": "Pre-signed URLs or IAM credentials" }
        ]
      }
    },
    "mlflow": {
      "x": 950,
      "y": 400,
      "w": 180,
      "h": 70,
      "label": "MLflow",
      "sublabel": "Experiment Tracking",
      "color": "#3fb950",
      "fontSize": 16,
      "tooltip": {
        "title": "MLflow Tracking Server",
        "desc": "Experiment tracking service for logging evaluation metrics, parameters, and run metadata. EvalHub API creates experiments; the sidecar logs detailed metrics.",
        "details": [
          { "label": "Protocol", "value": "HTTPS REST API" },
          { "label": "Data", "value": "Metrics, parameters, artifacts" },
          { "label": "Integration", "value": "Created by API, populated by Sidecar" }
        ]
      }
    },
    "oci_registry": {
      "x": 950,
      "y": 600,
      "w": 180,
      "h": 70,
      "label": "OCI Registry",
      "sublabel": "Artifacts",
      "color": "#d2a8ff",
      "fontSize": 16,
      "tooltip": {
        "title": "OCI Registry",
        "desc": "OCI-compliant artifact registry for storing evaluation outputs such as model cards, detailed results, and evaluation reports.",
        "details": [
          { "label": "Protocol", "value": "OCI Distribution Spec" },
          { "label": "Content", "value": "Model cards, results, reports" },
          { "label": "Format", "value": "OCI artifacts" }
        ]
      }
    }
  },
  "flows": {
    "job_submission": {
      "label": "Job Submission & Execution",
      "steps": [
        {
          "text": "Client sends POST /api/v1/evaluations/jobs",
          "mode": "arrow",
          "from": "client",
          "to": "evalhub_api",
          "color": "#58a6ff",
          "num": 1,
          "fromRight": true,
          "toLeft": true,
          "inspector": {
            "title": "Job Submission Request",
            "body": "POST /api/v1/evaluations/jobs\nContent-Type: application/json\nAuthorization: Bearer <token>\n\n{\n  \"model\": \"my-model:latest\",\n  \"framework\": \"lm-eval\",\n  \"tasks\": [\"hellaswag\", \"mmlu\"],\n  \"config\": { ... }\n}"
          }
        },
        {
          "text": "EvalHub API validates auth (TokenReview + SubjectAccessReview)",
          "mode": "lightup",
          "target": "evalhub_api",
          "badge": 2,
          "color": "#f0883e",
          "inspector": {
            "title": "Authentication & Authorization",
            "body": "1. TokenReview: Validates bearer token\n   with Kubernetes API server\n\n2. SubjectAccessReview: Checks if the\n   authenticated user has permission to\n   create evaluation jobs in the namespace\n\nAuth flow: Token -> K8s API -> RBAC check"
          }
        },
        {
          "text": "Store job record in PostgreSQL (state=Pending)",
          "mode": "arrow",
          "from": "evalhub_api",
          "to": "postgres",
          "color": "#58a6ff",
          "num": 3,
          "fromBottom": true,
          "toTop": true,
          "inspector": {
            "title": "Persist Job Record",
            "body": "INSERT INTO evaluation_jobs (\n  id, model, framework, tasks,\n  state, created_at\n) VALUES (\n  uuid_generate_v4(),\n  'my-model:latest',\n  'lm-eval',\n  '{hellaswag, mmlu}',\n  'Pending',\n  NOW()\n);"
          }
        },
        {
          "text": "Create MLflow experiment for tracking",
          "mode": "arrow",
          "from": "evalhub_api",
          "to": "mlflow",
          "color": "#58a6ff",
          "num": 4,
          "fromRight": true,
          "toLeft": true,
          "yOff": -10,
          "inspector": {
            "title": "Create MLflow Experiment",
            "body": "POST /api/2.0/mlflow/experiments/create\n\n{\n  \"name\": \"eval-<job-id>\",\n  \"tags\": {\n    \"model\": \"my-model:latest\",\n    \"framework\": \"lm-eval\"\n  }\n}\n\nReturns experiment_id for later metric logging."
          }
        },
        {
          "text": "Create K8s Job + ConfigMap via Kubernetes API",
          "mode": "arrow",
          "from": "evalhub_api",
          "to": "k8s_api",
          "color": "#58a6ff",
          "num": 5,
          "fromTop": true,
          "toBottom": true,
          "inspector": {
            "title": "Create Kubernetes Resources",
            "body": "Creates two K8s resources:\n\n1. ConfigMap: Evaluation config, task\n   definitions, model endpoints\n\n2. Job: Pod spec with:\n   - initContainer (data download)\n   - evalAdapter (main evaluation)\n   - sidecarProxy (KEP-753 native)\n   - Resource limits (CPU, memory, GPU)\n   - Shared volumes (emptyDir)"
          }
        },
        {
          "text": "Init Container downloads test data from S3",
          "mode": "arrow",
          "from": "init_container",
          "to": "s3_storage",
          "color": "#58a6ff",
          "num": 6,
          "fromRight": true,
          "toLeft": true,
          "inspector": {
            "title": "Download Test Data",
            "body": "Init container fetches evaluation data:\n\n- Benchmark datasets (hellaswag, mmlu)\n- Custom test configurations\n- Ground truth labels\n\nData written to shared emptyDir volume\nat /data/eval/ for the adapter to read.\n\nInit container must complete successfully\nbefore other containers start."
          }
        },
        {
          "text": "Eval Adapter starts evaluation",
          "mode": "lightup",
          "target": "eval_adapter",
          "badge": 7,
          "color": "#f0883e",
          "inspector": {
            "title": "Evaluation Execution",
            "body": "Eval adapter starts the selected framework:\n\n$ lm-eval --model <endpoint> \\\n         --tasks hellaswag,mmlu \\\n         --data_dir /data/eval/ \\\n         --output_dir /results/\n\nReads config from mounted ConfigMap.\nReads test data from shared volume.\nStreams progress to stdout for logging."
          }
        },
        {
          "text": "Adapter sends results via Sidecar (localhost:8080)",
          "mode": "arrow",
          "from": "eval_adapter",
          "to": "sidecar_proxy",
          "color": "#58a6ff",
          "num": 8,
          "fromBottom": true,
          "toTop": true,
          "inspector": {
            "title": "Results to Sidecar",
            "body": "POST http://localhost:8080/results\n\n{\n  \"status\": \"complete\",\n  \"metrics\": {\n    \"hellaswag_acc\": 0.82,\n    \"mmlu_acc\": 0.75\n  },\n  \"artifacts\": [\n    \"model_card.json\",\n    \"detailed_results.json\"\n  ]\n}\n\nSidecar handles all authenticated egress."
          }
        },
        {
          "text": "Sidecar reports status callback to EvalHub API",
          "mode": "arrow",
          "from": "sidecar_proxy",
          "to": "evalhub_api",
          "color": "#3fb950",
          "num": 9,
          "fromLeft": true,
          "toRight": true,
          "yOff": 15,
          "inspector": {
            "title": "Status Callback",
            "body": "PUT /api/v1/evaluations/jobs/<id>/status\n\n{\n  \"state\": \"Complete\",\n  \"metrics_summary\": {\n    \"hellaswag_acc\": 0.82,\n    \"mmlu_acc\": 0.75\n  },\n  \"completed_at\": \"2026-06-04T12:34:56Z\"\n}\n\nEvalHub API updates PostgreSQL record."
          }
        },
        {
          "text": "Sidecar logs metrics to MLflow",
          "mode": "arrow",
          "from": "sidecar_proxy",
          "to": "mlflow",
          "color": "#3fb950",
          "num": 10,
          "fromRight": true,
          "toLeft": true,
          "yOff": 10,
          "inspector": {
            "title": "Log Metrics to MLflow",
            "body": "POST /api/2.0/mlflow/runs/log-batch\n\n{\n  \"run_id\": \"<run-id>\",\n  \"metrics\": [\n    {\"key\": \"hellaswag_acc\", \"value\": 0.82},\n    {\"key\": \"mmlu_acc\", \"value\": 0.75},\n    {\"key\": \"eval_duration_s\", \"value\": 3420}\n  ],\n  \"params\": [\n    {\"key\": \"framework\", \"value\": \"lm-eval\"},\n    {\"key\": \"model\", \"value\": \"my-model:latest\"}\n  ]\n}"
          }
        },
        {
          "text": "Sidecar pushes artifacts to OCI Registry",
          "mode": "arrow",
          "from": "sidecar_proxy",
          "to": "oci_registry",
          "color": "#3fb950",
          "num": 11,
          "fromRight": true,
          "toLeft": true,
          "yOff": -5,
          "inspector": {
            "title": "Push Artifacts to OCI",
            "body": "Push evaluation artifacts as OCI objects:\n\n- model_card.json (model card)\n- detailed_results.json (full metrics)\n- eval_report.html (human-readable)\n\nRegistry: registry.example.com\nRepository: eval-results/my-model\nTag: eval-<job-id>\n\nUses OCI Distribution Specification API."
          }
        },
        {
          "text": "EvalHub API returns results to Client",
          "mode": "arrow",
          "from": "evalhub_api",
          "to": "client",
          "color": "#3fb950",
          "num": 12,
          "fromLeft": true,
          "toRight": true,
          "yOff": 10,
          "inspector": {
            "title": "Final Response",
            "body": "GET /api/v1/evaluations/jobs/<id>\n\n200 OK\n{\n  \"id\": \"<job-id>\",\n  \"state\": \"Complete\",\n  \"model\": \"my-model:latest\",\n  \"framework\": \"lm-eval\",\n  \"metrics\": {\n    \"hellaswag_acc\": 0.82,\n    \"mmlu_acc\": 0.75\n  },\n  \"mlflow_url\": \"https://mlflow.../run\",\n  \"artifacts_url\": \"oci://registry.../eval\",\n  \"completed_at\": \"2026-06-04T12:34:56Z\"\n}"
          }
        }
      ]
    },
    "status_polling": {
      "label": "Job Status Polling",
      "steps": [
        {
          "text": "Client sends GET /api/v1/evaluations/jobs/{id}",
          "mode": "arrow",
          "from": "client",
          "to": "evalhub_api",
          "color": "#58a6ff",
          "num": 1,
          "fromRight": true,
          "toLeft": true,
          "inspector": {
            "title": "Status Poll Request",
            "body": "GET /api/v1/evaluations/jobs/<id>\nAuthorization: Bearer <token>\n\nClient polls this endpoint to check\njob progress. Supports both individual\njob lookup and listing with filters:\n\nGET /api/v1/evaluations/jobs?state=Running"
          }
        },
        {
          "text": "EvalHub API queries PostgreSQL for job status",
          "mode": "arrow",
          "from": "evalhub_api",
          "to": "postgres",
          "color": "#58a6ff",
          "num": 2,
          "fromBottom": true,
          "toTop": true,
          "inspector": {
            "title": "Database Query",
            "body": "SELECT id, model, framework, state,\n       metrics, created_at, updated_at,\n       completed_at, error_message\nFROM evaluation_jobs\nWHERE id = '<job-id>';"
          }
        },
        {
          "text": "PostgreSQL returns job status record",
          "mode": "arrow",
          "from": "postgres",
          "to": "evalhub_api",
          "color": "#3fb950",
          "num": 3,
          "fromTop": true,
          "toBottom": true,
          "yOff": 5,
          "inspector": {
            "title": "Database Response",
            "body": "Returns job record with current state:\n\n{\n  id: '<job-id>',\n  model: 'my-model:latest',\n  framework: 'lm-eval',\n  state: 'Running',\n  created_at: '2026-06-04T12:00:00Z',\n  updated_at: '2026-06-04T12:15:00Z'\n}"
          }
        },
        {
          "text": "EvalHub API returns status to Client",
          "mode": "arrow",
          "from": "evalhub_api",
          "to": "client",
          "color": "#3fb950",
          "num": 4,
          "fromLeft": true,
          "toRight": true,
          "yOff": 10,
          "inspector": {
            "title": "Status Response",
            "body": "200 OK\n{\n  \"id\": \"<job-id>\",\n  \"state\": \"Running\",\n  \"model\": \"my-model:latest\",\n  \"framework\": \"lm-eval\",\n  \"progress\": {\n    \"tasks_completed\": 1,\n    \"tasks_total\": 2\n  },\n  \"created_at\": \"2026-06-04T12:00:00Z\",\n  \"updated_at\": \"2026-06-04T12:15:00Z\"\n}"
          }
        }
      ]
    }
  },
  "legend": [
    { "label": "Request", "color": "#58a6ff" },
    { "label": "Response / Callback", "color": "#3fb950" },
    { "label": "Auth", "color": "#f0883e" },
    { "label": "Error", "color": "#f85149" }
  ],
  "flowOrder": ["job_submission", "status_polling"],
  "defaultFlow": "job_submission"
};

const viz = new FlowStory(document.getElementById('fs-canvas'), {
  stepsContainer: document.getElementById('fs-steps-container'),
  inspectorTitle: document.getElementById('fs-inspector-title'),
  inspectorContent: document.getElementById('fs-inspector-content'),
  overlay: document.getElementById('fs-overlay'),
  overlayCard: document.getElementById('fs-overlay-card'),
  overlayTitle: document.getElementById('fs-overlay-title'),
  overlayDesc: document.getElementById('fs-overlay-desc'),
  overlayDetails: document.getElementById('fs-overlay-details'),
  overlayAccent: document.getElementById('fs-overlay-accent'),
  overlayClose: document.getElementById('fs-overlay-close'),
  overlayResume: document.getElementById('fs-overlay-resume'),
  highlightBox: document.getElementById('fs-highlight-box'),
  brand: document.getElementById('fs-brand'),
  title: document.getElementById('fs-title'),
  legend: document.getElementById('fs-legend'),
  flowSelect: document.getElementById('fs-flow-select'),
  playBtn: document.getElementById('fs-play'),
  speedBtn: document.getElementById('fs-speed'),
  loopBtn: document.getElementById('fs-loop'),
  resetBtn: document.getElementById('fs-reset'),
  themeBtn: document.getElementById('fs-theme'),
});
window.__flowstory = viz;
await viz.load(diagram);
viz.state.loopMode = true;
viz.play();
</script>
</body>
</html>
